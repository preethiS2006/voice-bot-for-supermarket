<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Fresh AI Voice Bot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="layout-wrapper">
        <div class="app-container">
            <!-- Sidebar / Header -->
        <header class="glass-header">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <div>
                    <h1>Nova Fresh</h1>
                    <span class="subtitle">AI Voice Assistant</span>
                </div>
            </div>
            
            <div class="controls">
                <div class="language-selector">
                    <input type="radio" id="en" name="language" value="en-IN" checked>
                    <label for="en">English</label>
                    <input type="radio" id="ta" name="language" value="ta-IN">
                    <label for="ta">தமிழ்</label>
                </div>
                <button class="icon-btn" id="settings-btn" title="Settings"><i class="fas fa-cog"></i></button>
                <div class="rag-badge" id="rag-badge" title="RAG Engine Active">
                    <i class="fas fa-brain"></i>
                    <span>RAG</span>
                </div>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="transcript-container" id="transcript-container">
                <div class="message system">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-body">
                        <div class="content" id="greeting-text">Hi, what are the things you would like to buy?</div>
                        <div class="timestamp" id="init-time"></div>
                    </div>
                </div>
            </div>


        </main>

        <!-- Bottom Interaction Area -->
        <footer class="interaction-zone">
            <div class="status-badge" id="status-badge">
                <span class="dot"></span>
                <span id="status-text">System Ready</span>
            </div>

            <!-- Visualizer Canvas -->
            <div class="visualizer-container">
                <canvas id="audio-visualizer"></canvas>
            </div>

            <div class="input-area">
                <div class="mic-wrapper">
                    <button id="mic-btn" class="mic-btn" aria-label="Microphone">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <div class="ripple-ring ring-1"></div>
                    <div class="ripple-ring ring-2"></div>
                </div>
            </div>

            <p class="hint-text">Tap the microphone to order</p>
        </footer>
        </div>

        <!-- Excel Sheet / Cart View -->
        <div class="order-sheet-container">
            <header class="glass-header">
                <h2><i class="fas fa-file-excel"></i> Live Order Sheet</h2>
            </header>
            <div class="table-wrapper">
                <table id="order-table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Quantity Ordered</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="order-tbody">
                        <tr><td colspan="3" style="text-align:center; padding: 20px; color: var(--text-muted);">Your order is empty</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="order-summary">
                <button id="download-btn" class="download-btn" title="Export Orders as CSV" disabled>
                    <i class="fas fa-download"></i> Export Orders
                </button>
            </div>
        </div>
    </div>

    <script src="knowledge-base.js"></script>
    <script src="rag-engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
